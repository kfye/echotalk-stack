# EchoTalk 容器栈 — 单台 2核2G 服务器 / Portainer 管理
# 服务：Nginx(反代+静态) + MySQL 8 + Redis + Go 占位服务
# 设计要点：DB/Redis 只走内网不暴露公网；每个容器设内存上限防 OOM。
services:

  # ---- 接入层：反向代理 + 管理端静态托管 ----
  nginx:
    image: nginx:1.27-alpine
    container_name: echotalk-nginx
    restart: unless-stopped
    ports:
      - "80:80"        # HTTPS(443) 待域名备案+证书后开启
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./admin/dist:/usr/share/nginx/html:ro   # Vue 管理端构建产物
    depends_on:
      app:
        condition: service_healthy
    networks:
      - echotalk
    mem_limit: 64m
    mem_reservation: 32m

  # ---- 应用服务层：Go 占位服务（Day 2 起替换为真实 backend）----
  app:
    build:
      context: ./placeholder
    image: echotalk/app-placeholder:latest
    container_name: echotalk-app
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "/app/placeholder", "-healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 64m

  # ---- 数据层：MySQL 8（调瘦，仅内网）----
  mysql:
    image: mysql:8.0
    container_name: echotalk-mysql
    restart: unless-stopped
    # 只内网可达，绝不映射公网端口（安全组也只放 80/443）
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    # 2核2G 调瘦：缓冲池 128M、关 performance_schema、连接数调小
    command:
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF
      - --max-connections=50
      - --innodb-flush-log-at-trx-commit=2
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 256m

  # ---- 缓存层：Redis（限内存，仅内网）----
  redis:
    image: redis:7.2-alpine
    container_name: echotalk-redis
    restart: unless-stopped
    expose:
      - "6379"
    command:
      - redis-server
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis-data:/data
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_limit: 200m
    mem_reservation: 96m

networks:
  echotalk:
    name: echotalk
    driver: bridge

volumes:
  mysql-data:
  redis-data:
