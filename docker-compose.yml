# EchoTalk 容器栈 — 单台 2核2G 服务器 / Portainer 管理
# 服务：Nginx(反代+静态) + MySQL 8 + Redis + Go 占位服务
# 设计：全部用 build(COPY 进镜像) + 命名卷，运行时无 bind 挂载，
#       避开 Portainer git stack 的「单文件挂载变目录」坑。
services:

  # ---- 接入层：反向代理 + 管理端静态托管（配置已打进镜像）----
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: echotalk/nginx:latest
    pull_policy: build        # 重新部署时强制按源码重建（standalone 需显式声明）
    container_name: echotalk-nginx
    restart: unless-stopped
    ports:
      - "80:80"        # HTTPS(443) 待域名备案+证书后开启
    depends_on:
      app:
        condition: service_healthy
    networks:
      - echotalk
    mem_limit: 64m
    mem_reservation: 32m

  # ---- 应用服务层：Go 占位服务（Day 2 起替换为真实 backend）----
  app:
    build:
      context: ./placeholder
    image: echotalk/app-placeholder:latest
    pull_policy: build        # 重新部署时强制按源码重建
    container_name: echotalk-app
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "/app/placeholder", "-healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 64m

  # ---- 数据层：MySQL 8（调优全走 command，无挂载；仅内网）----
  mysql:
    image: mysql:8.0
    container_name: echotalk-mysql
    restart: unless-stopped
    expose:
      - "3306"          # 仅内网可达，绝不映射公网（安全组只放 80/443）
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    # 2核2G 调瘦（防 OOM）
    command:
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF
      - --max-connections=50
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-log-buffer-size=8M
      - --tmp-table-size=16M
      - --max-heap-table-size=16M
      - --sort-buffer-size=1M
      - --join-buffer-size=1M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql      # 命名卷，非 bind 挂载
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 256m

  # ---- 缓存层：Redis（限内存，调优走 command；仅内网）----
  redis:
    image: redis:7.2-alpine
    container_name: echotalk-redis
    restart: unless-stopped
    expose:
      - "6379"
    command:
      - redis-server
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis-data:/data               # 命名卷，非 bind 挂载
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_limit: 200m
    mem_reservation: 96m

networks:
  echotalk:
    name: echotalk
    driver: bridge

volumes:
  mysql-data:
  redis-data:
