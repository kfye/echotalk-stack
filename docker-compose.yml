# EchoTalk 容器栈 — 单台 2核2G 服务器 / Portainer 管理
# 服务：Nginx(反代+静态) + MySQL 8 + Redis + Go 占位服务
# 设计要点：DB/Redis 只走内网，不暴露公网；每个容器设内存上限防 OOM。
services:

  # ---- 接入层：反向代理 + 管理端静态托管 ----
  nginx:
    image: nginx:1.27-alpine
    container_name: echotalk-nginx
    restart: unless-stopped
    ports:
      - "80:80"        # HTTPS(443) 待域名备案+证书后开启
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./admin/dist:/usr/share/nginx/html:ro   # Vue 管理端构建产物
    depends_on:
      app:
        condition: service_healthy
    networks:
      - echotalk
    mem_limit: 64m
    mem_reservation: 32m

  # ---- 应用服务层：Go 占位服务（Day 2 起替换为真实 backend）----
  app:
    build:
      context: ./placeholder
    image: echotalk/app-placeholder:latest
    container_name: echotalk-app
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echotalk
    healthcheck:
      test: ["CMD", "/app/placeholder", "-healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 64m

networks:
  echotalk:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
