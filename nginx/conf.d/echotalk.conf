# EchoTalk 接入配置
# 当前为 HTTP（开发联调）。域名备案 + 证书就绪后，按文末注释开启 HTTPS。

upstream echotalk_app {
    server app:8080;
}

server {
    listen       80;
    server_name  _;

    # ---- API：反代到 Go 服务 ----
    location /api/ {
        proxy_pass         http://echotalk_app/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- 健康检查直通（运维/拨测用）----
    location = /health {
        proxy_pass http://echotalk_app/health;
    }

    # ---- 管理端静态资源（Vue 构建产物，history 路由回退）----
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

